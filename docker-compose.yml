services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
  web:
    image: node:20-alpine
    working_dir: /web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/web
    environment:
      - VITE_API_URL=http://localhost:8000
